name: Build (Swift)

on:
  workflow_call:

permissions:
  contents: read

jobs:
  build:
    name: Build and Test (Swift)
    runs-on: macos-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5.2.0
        with:
          distribution: zulu
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6.1.0

      - name: Print Swift / Xcode versions
        run: |
          swift --version
          xcodebuild -version

      # `embedSwiftExportForXcode` is the entry point for Kotlin's Swift
      # Export pipeline. Outside an `xcodebuild`-driven invocation, the
      # plugin's `BuildSPMSwiftExportPackage` task fails its property
      # validation because the environment variables Xcode normally injects
      # aren't present. The variables below cover what the plugin reads:
      #
      #   * SDK_NAME / ARCHS / CONFIGURATION — which slice to build.
      #   * BUILT_PRODUCTS_DIR / TARGET_BUILD_DIR — where to land the static
      #     archive and `.swiftmodule` bundles.
      #   * FRAMEWORKS_FOLDER_PATH — relative path inside BUILT_PRODUCTS_DIR
      #     where embedded frameworks would land.
      #   * MACOSX_DEPLOYMENT_TARGET — the minimum macOS version.
      #   * DEPLOYMENT_TARGET_SETTING_NAME — the indirection variable
      #     telling the plugin which deployment-target env var to read.
      #     Xcode sets this automatically per-target; outside Xcode it
      #     must be set explicitly or the task fails with
      #     `property 'deploymentTargetSettingName' doesn't have a
      #     configured value`.
      #
      # Output lands in `build/swift-test/`:
      #   * `libSchemars.a` — the merged static archive containing
      #     every `@ExportedBridge`-annotated function emitted by
      #     `build/SwiftExport/macosArm64/Debug/**/*.kt`.
      #   * Four `.swiftmodule/` directories: Schemars,
      #     KotlinRuntimeSupport, ExportedKotlinPackages, KotlinRuntime.
      - name: Build Swift Export package
        env:
          BUILT_PRODUCTS_DIR: ${{ github.workspace }}/build/swift-test
          TARGET_BUILD_DIR: ${{ github.workspace }}/build/swift-test
          SDK_NAME: macosx
          CONFIGURATION: Debug
          ARCHS: arm64
          FRAMEWORKS_FOLDER_PATH: Frameworks
          MACOSX_DEPLOYMENT_TARGET: "14.0"
          DEPLOYMENT_TARGET_SETTING_NAME: MACOSX_DEPLOYMENT_TARGET
        run: ./gradlew embedSwiftExportForXcode --no-configuration-cache

      - name: Run swift test against Kotlin-exported module
        working-directory: swift-test-harness
        run: swift test

      - name: Upload Swift Export artifacts
        if: success() || failure()
        uses: actions/upload-artifact@v7
        with:
          name: swift-export-artifacts
          path: |
            build/swift-test/libSchemars.a
            build/swift-test/*.swiftmodule/
            build/SPMPackage/macosArm64/Debug/
          retention-days: 7
          if-no-files-found: warn
